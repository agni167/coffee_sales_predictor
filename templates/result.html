<!DOCTYPE html>
<html>
<head>
    <title>Prediction Results</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #f7f2e9;
        }

        .result-box {
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            max-width: 800px;
            margin: auto;
        }

        h2 {
            color: #5e3c1d;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 8px;
        }

        th {
            background-color: #e8d8c3;
        }
    </style>
</head>
<body>
    <div class="result-box">
        <h2>✅ Prediction Completed</h2>
        <p><strong>Prediction:</strong> {{ prediction }}</p>

        <h3>📄 Uploaded Data:</h3>
        <table>
            <thead>
                <tr>
                    {% for col in columns %}
                    <th>{{ col }}</th>
                    {% endfor %}
                </tr>
            </thead>
            <tbody>
                {% for row in data %}
                <tr>
                    {% for item in row %}
                    <td>{{ item }}</td>
                    {% endfor %}
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <h3>📊 Coffee Sales Chart:</h3>
<img src="{{ url_for('static', filename='sales_chart.png') }}" alt="Coffee Sales Chart" style="max-width: 600px;">

    </div>
</body>
</html>
